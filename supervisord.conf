[supervisord]
logfile=/dev/null
logfile_maxbytes=0
nodaemon=true
user=root

[program:node_init]
command=bash -c "/node_initialize.sh"
user=root
autostart=true
startsecs=5

[program:mn_autoheal]
command=bash -c "/mn-autoheal.sh"
user=root
autostart=true
autorestart=true
startsecs=10

[program:crond]
command = /usr/sbin/cron -f
user = root
autostart = true
autorestart = true
logfile_maxbytes=20MB
startsecs=10
